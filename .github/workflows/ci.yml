name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. new push to an open PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # matches package.json engines.node (>=22.0.0)
          cache: npm

      - name: Install dependencies
        run: npm ci

      # lint + typecheck (tests/** covered via tsconfig.typecheck.json) + unit tests.
      # No Postgres/Redis services needed: `npm test` runs the unit project only, and
      # integration tests self-skip without SWARM_TEST_DB_AVAILABLE.
      - name: Verify
        run: npm run verify
