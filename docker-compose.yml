name: swarm # Fixed name → network is always "swarm_default"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swarm}
      POSTGRES_DB: swarm
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm -d swarm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  router:
    build:
      context: .
      dockerfile: Dockerfile.router
    restart: unless-stopped
    ports:
      - "${ROUTER_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://swarm:${POSTGRES_PASSWORD:-swarm}@postgres:5432/swarm
      REDIS_URL: redis://redis:6379
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://swarm:${POSTGRES_PASSWORD:-swarm}@postgres:5432/swarm
      REDIS_URL: redis://redis:6379
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  postgres-data:
  redis-data:
