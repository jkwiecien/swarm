name: swarm # Fixed name → network is always "swarm_default"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swarm}
      POSTGRES_DB: swarm
    ports:
      # Host port offset from Postgres' 5432 default so SWARM can run alongside
      # Cascade (and any other local Postgres) without a host-port clash.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm -d swarm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # Offset from Redis' 6379 default — see the Postgres note above.
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  router:
    build:
      context: .
      dockerfile: Dockerfile.router
    restart: unless-stopped
    ports:
      # Offset from Cascade's router (3000) so both can run at once.
      - "${ROUTER_PORT:-3100}:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://swarm:${POSTGRES_PASSWORD:-swarm}@postgres:5432/swarm
      # The compose Postgres serves no TLS; without this, client.ts defaults to
      # rejectUnauthorized:true and the first app-code connection would fail.
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # The worker is NOT containerized: it provisions Git worktrees and spawns the
  # `claude` / `antigravity` CLIs, which need the developer's own PATH, auth, and
  # config. It runs on the host instead (`npm run dev:worker`), talking to the
  # containers below over their published host ports. See README "Running the
  # stack" and ai/ARCHITECTURE.md.

volumes:
  postgres-data:
  redis-data:
